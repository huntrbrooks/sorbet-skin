<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1400" role="img" aria-label="Caramel Cloud body butter jar">
  <defs>
    <linearGradient id="cc-jar" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#F5DCC4"/>
      <stop offset="0.45" stop-color="#D4A574"/>
      <stop offset="1" stop-color="#A87545"/>
    </linearGradient>
    <linearGradient id="cc-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFAF2"/>
      <stop offset="1" stop-color="#E8C9A0"/>
    </linearGradient>
    <radialGradient id="cc-shine" cx="0.3" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cc-shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="42" stdDeviation="34" flood-color="#704625" flood-opacity="0.22"/>
    </filter>
  </defs>

  <ellipse cx="512" cy="1255" rx="280" ry="44" fill="#704625" opacity="0.18"/>

  <g filter="url(#cc-shadow)">
    <rect x="282" y="240" width="460" height="180" rx="22" fill="url(#cc-lid)" stroke="#FFFFFF" stroke-width="3"/>
    <rect x="282" y="386" width="460" height="34" rx="6" fill="#C49968" opacity="0.55"/>
    <rect x="262" y="420" width="500" height="780" rx="64" fill="url(#cc-jar)" stroke="#FFFFFF" stroke-width="4"/>
    <rect x="262" y="420" width="500" height="780" rx="64" fill="url(#cc-shine)" opacity="0.65"/>

    <text x="512" y="690" text-anchor="middle" font-family="DM Mono, IBM Plex Mono, monospace" font-size="22" font-weight="500" letter-spacing="6" fill="#2A1810">SORBET SKIN</text>
    <line x1="412" y1="715" x2="612" y2="715" stroke="#2A1810" stroke-width="1" opacity="0.4"/>

    <text x="512" y="810" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="500" fill="#2A1810" letter-spacing="-2">Caramel</text>
    <text x="512" y="900" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="500" fill="#2A1810" font-style="italic" letter-spacing="-2">Cloud</text>

    <text x="512" y="970" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="22" font-weight="500" fill="#2A1810" opacity="0.65">whipped body tan mousse</text>
    <text x="512" y="1005" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="18" font-weight="400" fill="#2A1810" opacity="0.5">200 ml · 6.7 fl oz</text>
  </g>
</svg>
