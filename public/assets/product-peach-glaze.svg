<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1400" role="img" aria-label="Peach Glaze body butter jar">
  <defs>
    <linearGradient id="pg-jar" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FFEBDD"/>
      <stop offset="0.45" stop-color="#FFC9A8"/>
      <stop offset="1" stop-color="#F39E73"/>
    </linearGradient>
    <linearGradient id="pg-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFAF5"/>
      <stop offset="1" stop-color="#FFDAC1"/>
    </linearGradient>
    <radialGradient id="pg-shine" cx="0.3" cy="0.18" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="pg-shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="42" stdDeviation="34" flood-color="#9E5A38" flood-opacity="0.22"/>
    </filter>
  </defs>

  <ellipse cx="512" cy="1255" rx="280" ry="44" fill="#9E5A38" opacity="0.18"/>

  <g filter="url(#pg-shadow)">
    <!-- Lid -->
    <rect x="282" y="240" width="460" height="180" rx="22" fill="url(#pg-lid)" stroke="#FFFFFF" stroke-width="3"/>
    <rect x="282" y="386" width="460" height="34" rx="6" fill="#F1B895" opacity="0.55"/>

    <!-- Jar body -->
    <rect x="262" y="420" width="500" height="780" rx="64" fill="url(#pg-jar)" stroke="#FFFFFF" stroke-width="4"/>

    <!-- Shine -->
    <rect x="262" y="420" width="500" height="780" rx="64" fill="url(#pg-shine)" opacity="0.7"/>

    <!-- Label area -->
    <rect x="304" y="620" width="416" height="430" rx="14" fill="#FFFFFF" opacity="0.0"/>

    <!-- Brand -->
    <text x="512" y="690" text-anchor="middle" font-family="DM Mono, IBM Plex Mono, monospace" font-size="22" font-weight="500" letter-spacing="6" fill="#2A1810">SORBET SKIN</text>
    <line x1="412" y1="715" x2="612" y2="715" stroke="#2A1810" stroke-width="1" opacity="0.4"/>

    <!-- Product name -->
    <text x="512" y="810" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="500" fill="#2A1810" letter-spacing="-2">Peach</text>
    <text x="512" y="900" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="500" fill="#2A1810" font-style="italic" letter-spacing="-2">Glaze</text>

    <!-- Sub label -->
    <text x="512" y="970" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="22" font-weight="500" fill="#2A1810" opacity="0.65">whipped body tan mousse</text>
    <text x="512" y="1005" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="18" font-weight="400" fill="#2A1810" opacity="0.5">200 ml · 6.7 fl oz</text>
  </g>
</svg>
