<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1400" role="img" aria-label="Cocoa Drip express tan bottle">
  <defs>
    <linearGradient id="cd-jar" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#7A5036"/>
      <stop offset="0.45" stop-color="#5B3522"/>
      <stop offset="1" stop-color="#3A2014"/>
    </linearGradient>
    <linearGradient id="cd-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2014"/>
      <stop offset="1" stop-color="#2A1810"/>
    </linearGradient>
    <radialGradient id="cd-shine" cx="0.32" cy="0.2" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="cd-shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="42" stdDeviation="34" flood-color="#1F1208" flood-opacity="0.32"/>
    </filter>
  </defs>

  <ellipse cx="512" cy="1255" rx="270" ry="44" fill="#1F1208" opacity="0.24"/>

  <g filter="url(#cd-shadow)">
    <!-- Pump cap -->
    <rect x="446" y="180" width="132" height="40" rx="10" fill="#2A1810"/>
    <rect x="358" y="220" width="308" height="120" rx="18" fill="url(#cd-lid)" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.15"/>
    <rect x="320" y="340" width="384" height="44" rx="8" fill="#2A1810" opacity="0.7"/>

    <!-- Bottle body (taller, tapered) -->
    <path d="M 312 384 L 312 1100 Q 312 1196 408 1196 L 616 1196 Q 712 1196 712 1100 L 712 384 Z" fill="url(#cd-jar)" stroke="#FFFFFF" stroke-width="3" stroke-opacity="0.15"/>
    <path d="M 312 384 L 312 1100 Q 312 1196 408 1196 L 616 1196 Q 712 1196 712 1100 L 712 384 Z" fill="url(#cd-shine)"/>

    <!-- Cream label panel -->
    <rect x="332" y="540" width="360" height="440" rx="18" fill="#F8EFE3"/>

    <text x="512" y="610" text-anchor="middle" font-family="DM Mono, IBM Plex Mono, monospace" font-size="20" font-weight="500" letter-spacing="6" fill="#2A1810">SORBET SKIN</text>
    <line x1="432" y1="632" x2="592" y2="632" stroke="#2A1810" stroke-width="1" opacity="0.4"/>

    <text x="512" y="720" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="76" font-weight="500" fill="#2A1810" letter-spacing="-1.5">Cocoa</text>
    <text x="512" y="800" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-size="76" font-weight="500" fill="#2A1810" font-style="italic" letter-spacing="-1.5">Drip</text>

    <text x="512" y="870" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="20" font-weight="500" fill="#2A1810" opacity="0.7">express deep bronze foam</text>
    <text x="512" y="910" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="16" font-weight="400" fill="#2A1810" opacity="0.5">200 ml · 6.7 fl oz</text>
    <text x="512" y="952" text-anchor="middle" font-family="DM Mono, IBM Plex Mono, monospace" font-size="13" font-weight="500" letter-spacing="3" fill="#C97A90">1–3 HOUR RINSE</text>
  </g>
</svg>
